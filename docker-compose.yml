version: "3.9"

services:
  rust_dev:
    build: 
      context: .
    volumes:
      - .:/usr/src/myapp
    environment:
      - USER=fdbiondi
      - PORT=8080
    ports:
      - 8080:8080
    networks:
      - rust-net
    command: >
       bash -c "cargo watch -c -w src -x run"
    # bash -c "cargo build && cargo run"

networks:
  rust-net:
    driver: bridge
